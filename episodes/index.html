<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Episode — Locally Hosted</title>
    <meta name="description" content="AI-generated video episode with transcript.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/style.css">
    <style>
        .episode-detail {
            max-width: 800px;
            margin: 80px auto 60px;
            padding: 0 var(--space-md);
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--ink-light);
            text-decoration: none;
            margin-bottom: var(--space-xl);
            font-size: 14px;
        }
        .back-link:hover { color: var(--primary); }
        .episode-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: var(--space-sm);
        }
        .episode-detail-meta {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            color: var(--ink-muted);
            font-size: 14px;
            flex-wrap: wrap;
        }
        .episode-tags { display: flex; gap: 6px; flex-wrap: wrap; }
        .tag {
            padding: 2px 10px;
            border-radius: var(--radius-full);
            font-size: 12px;
            font-weight: 500;
        }
        .video-placeholder {
            background: linear-gradient(135deg, #0f0f23, #1a1a3e);
            border-radius: var(--radius-lg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 300px;
            margin: var(--space-xl) 0;
            color: var(--ink-muted);
        }
        .video-placeholder svg {
            margin-bottom: 12px;
            opacity: 0.5;
        }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin: var(--space-2xl) 0 var(--space-sm);
        }
        .transcript-text {
            color: var(--ink-light);
            line-height: 1.7;
        }
        .about-text {
            color: var(--ink-light);
            line-height: 1.7;
        }
        .empty-episode {
            text-align: center;
            padding: 80px 20px;
        }
        .empty-episode h2 {
            font-size: 22px;
            margin-bottom: var(--space-sm);
        }
        .empty-episode p {
            color: var(--ink-muted);
            margin-bottom: var(--space-xl);
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            color: var(--primary);
            text-decoration: none;
            font-size: 14px;
        }
        .back-btn:hover { border-color: var(--primary); }
        .episode-media {
            background: var(--surface);
            border-radius: var(--radius-md);
            padding: var(--space-md);
            margin: var(--space-xl) 0;
        }
        .episode-media h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--ink-light);
            margin-bottom: var(--space-sm);
        }
        .episode-media audio, .episode-media video {
            width: 100%;
            border-radius: var(--radius-sm);
        }
        .episode-source-link {
            display: inline-block;
            margin-top: var(--space-sm);
            color: var(--primary);
            text-decoration: none;
            font-size: 14px;
        }
        .episode-source-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="bg-layer">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <main class="episode-detail" id="episodeDetail">
        <!-- Rendered dynamically -->
    </main>

    <footer class="site-footer">
        <div class="footer-content">
            <div class="footer-brand">
                <span class="footer-logo">⚡ Locally Hosted</span>
                <p>Powered by local AI inference. No cloud dependencies.</p>
            </div>
            <div class="footer-links">
                <a href="https://github.com/ryanstorandt/ai-video-pipeline" target="_blank" rel="noopener">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                    Pipeline Repo
                </a>
            </div>
        </div>
    </footer>

    <script>
        // Get episode ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const episodeId = urlParams.get('id');
        const container = document.getElementById('episodeDetail');

        if (!episodeId) {
            container.innerHTML = `
                <div class="empty-episode">
                    <h2>No episode selected</h2>
                    <p>Choose an episode from the home page.</p>
                    <a href="../index.html" class="back-btn">← Back to all episodes</a>
                </div>`;
            document.title = 'Episode — Locally Hosted';
            exit;
        }

        let allEpisodes = [];
        try {
            const resp = await fetch('../episodes.json');
            if (!resp.ok) throw new Error('Failed to load episodes');
            allEpisodes = await resp.json();
        } catch (e) {
            container.innerHTML = `
                <div class="empty-episode">
                    <h2>Error loading episodes</h2>
                    <p>${e.message}</p>
                    <a href="../index.html" class="back-btn">← Back to all episodes</a>
                </div>`;
            exit;
        }

        const ep = allEpisodes.find(e => e.id === episodeId);
        if (!ep) {
            container.innerHTML = `
                <div class="empty-episode">
                    <h2>Episode not found</h2>
                    <p>No episode with ID "${episodeId}" exists.</p>
                    <a href="../index.html" class="back-btn">← Back to all episodes</a>
                </div>`;
            exit;
        }

        const date = new Date(ep.published_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        const tagColors = ['#818cf8','#f472b6','#34d399','#fbbf24','#06b6d4','#c084fc','#fb923c','#f87171'];
        
        // YouTube embed or placeholder
        const youtubeId = ep.youtube_id || ep.youtube_url?.split('v=')?.pop()?.split('&')[0] || '';
        const mediaHTML = youtubeId
            ? `<iframe src="https://www.youtube.com/embed/${youtubeId}" style="width:100%;height:300px;border:none;border-radius:var(--radius-md);" allowfullscreen></iframe>`
            : `<div class="video-placeholder">
                    <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:12px;opacity:0.5;"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    <p>Video will appear when published</p>
               </div>`;

        // Tags with unique colors
        const tagsHTML = (ep.tags || []).map((tag, i) => {
            const color = tagColors[i % tagColors.length];
            return `<span class="tag" style="background:${color}15;color:${color};border-color:${color}33;">${tag}</span>`;
        }).join('');

        // Source link
        const sourceLink = ep.source_url ? `<a href="${ep.source_url}" class="episode-source-link" target="_blank" rel="noopener">Source ↗</a>` : '';

        // Thumbnail / audio
        const thumbnailHTML = ep.thumbnail 
            ? `<img src="../episodes/${ep.id}/thumbnail.png" alt="" style="width:100%;border-radius:var(--radius-md);margin-bottom:var(--space-md);" onerror="this.style.display='none'">` 
            : '';
        const audioHTML = ep.audio_url 
            ? `<div class="episode-media"><h3>Audio</h3><audio controls><source src="${ep.audio_url}" type="audio/mpeg">Your browser does not support audio.</audio></div>`
            : '';

        document.title = `${ep.title} — Locally Hosted`;
        container.innerHTML = `
            <a href="../index.html" class="back-link">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Back to all episodes
            </a>
            
            <header class="episode-header">
                <h1>${ep.title}</h1>
                <div class="episode-detail-meta">
                    <span class="episode-date">${date}</span>
                    <div class="episode-tags">${tagsHTML}</div>
                </div>
            </header>

            ${thumbnailHTML}${mediaHTML}
            
            ${audioHTML}
            
            ${ep.description ? `
                <h3 class="section-title">About</h3>
                <p class="about-text">${ep.description}</p>
            ` : ''}
            
            ${sourceLink}
            
            <div style="margin-top:var(--space-xl);">
                <p style="color:var(--ink-muted);font-size:13px;">Episode #${ep.id}</p>
            </div>
        `;
    </script>
</body>
</html>
