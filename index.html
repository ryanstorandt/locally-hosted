<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locally Hosted — AI Video Episodes</title>
    <meta name="description" content="AI-generated video episodes with transcripts. Running entirely on local hardware.">
    <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
    <main class="container">
        <header class="site-header">
            <h1><a href="/" class="site-title">Locally Hosted</a></h1>
            <p class="site-tagline">AI-generated video episodes with transcripts. Running entirely on local hardware.</p>
        </header>

        <section class="episodes-section">
            <h2>All Episodes</h2>
            <div id="episodesGrid" class="episodes-grid"></div>
        </section>
    </main>

    <footer class="site-footer">
        <p>Generated by <a href="https://github.com/ryanstorandt/ai-video-pipeline" target="_blank" rel="noopener">Local Video Pipeline</a> — Built with local AI inference</p>
    </footer>

    <script>
        async function loadEpisodes() {
            try {
                const resp = await fetch('/episodes.json');
                if (!resp.ok) throw new Error('Failed to load episodes');
                const episodes = await resp.json();
                const grid = document.getElementById('episodesGrid');
                
                if (episodes.length === 0) {
                    grid.innerHTML = '<p class="empty-state">No episodes published yet. Stay tuned!</p>';
                    return;
                }
                
                const sorted = [...episodes].sort((a, b) => new Date(b.published_at) - new Date(a.published_at));
                
                grid.innerHTML = sorted.map(ep => {
                    const date = new Date(ep.published_at).toLocaleDateString('en-US', { 
                        year: 'numeric', month: 'long', day: 'numeric' 
                    });
                    const tags = ep.tags ? ep.tags.map(t => `<span class="tag">${t}</span>`).join('') : '';
                    const sourceLink = ep.source_url 
                        ? `<a href="${ep.source_url}" target="_blank" class="episode-source" rel="noopener">Source ↗</a>` 
                        : '';
                    const thumbnail = ep.thumbnail 
                        ? `<img src="/episodes/${ep.id}/thumbnail.png" alt="Thumbnail for ${ep.title}" class="episode-thumbnail" loading="lazy" onerror="this.style.display='none'">`
                        : '<div class="episode-thumbnail" style="display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);"><span style="color:#666;font-size:14px;">Coming soon</span></div>';
                    
                    return `
                        <article class="episode-card">
                            <a href="/episodes/${ep.id}/" class="episode-card-link">
                                ${thumbnail}
                                <div class="episode-overlay">
                                    <h3 class="episode-title">${ep.title}</h3>
                                    <div class="episode-meta">
                                        <span class="episode-date">${date}</span>
                                        ${sourceLink}
                                    </div>
                                    ${tags ? `<div class="episode-tags" style="margin-top:8px;">${tags}</div>` : ''}
                                </div>
                            </a>
                        </article>
                    `;
                }).join('');
            } catch (e) {
                document.getElementById('episodesGrid').innerHTML = 
                    `<p class="empty-state" style="color:var(--danger);">Error loading episodes: ${e.message}</p>`;
            }
        }
        
        loadEpisodes();
    </script>
</body>
</html>
