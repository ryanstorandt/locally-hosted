name: Add episode

# Run this from the Actions tab: paste a YouTube URL and it scrapes the video's
# title/description/tags/date, appends a record to episodes.json, and commits.
# GitHub Pages then redeploys with the new episode.

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: "YouTube video URL (or 11-char video id)"
        required: true
        type: string
      short_url:
        description: "YouTube Shorts URL (optional)"
        required: false
        type: string
      spotify_url:
        description: "Spotify episode URL (optional)"
        required: false
        type: string
      source_url:
        description: "Override the auto-detected source link (optional)"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: add-episode
  cancel-in-progress: false

jobs:
  add:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Append episode record
        run: |
          node scripts/add-episode.mjs "${{ inputs.youtube_url }}" \
            ${{ inputs.short_url && format('--short "{0}"', inputs.short_url) || '' }} \
            ${{ inputs.spotify_url && format('--spotify "{0}"', inputs.spotify_url) || '' }} \
            ${{ inputs.source_url && format('--source "{0}"', inputs.source_url) || '' }}

      - name: Commit and push
        run: |
          if git diff --quiet -- episodes.json; then
            echo "No change to episodes.json (duplicate video?)."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add episodes.json
          git commit -m "Add episode from ${{ inputs.youtube_url }}"
          git push
